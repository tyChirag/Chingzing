<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>


  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="container">
    

    <div class="left">
      <h1>Welcome Back!</h1>
      <p>Sign in with your Username and Password</p>
      <form id="login-form">
        <div class="input-group">
          <input id="username" name="username" type="text" placeholder="Username" required>
        </div>

        <div class="input-group">
          <input id="password" name="password" type="password" placeholder="Password" required>
        </div>

      <a href="" class="forgot">Forgot Password?</a>

      <button type="submit" class="login-btn">Login</button>

      </form>

      <div class="divider">or login with</div>

      <button class="social-btn google-btn"><i class="fab fa-google"></i> Login with Google</button>
      <button class="social-btn facebook-btn"><i class="fab fa-facebook-f"></i> Login with Facebook</button>

      <div class="register">
        Did not have an account? <span>Register Now</span>
      </div>
      <div id="message" class="message"></div>
    </div>

    <div class="right"></div>

  </div>

  <div class="redirect-overlay" id="redirect-overlay" aria-hidden="true">
    <div class="loader-box">
      <div class="ball"></div>
      <div class="ball"></div>
      <div class="ball"></div>
      <p>Getting ready... Redirecting to Chingzing</p>
    </div>
  </div>

    <script src="login.js"></script>
</body>
</html>
