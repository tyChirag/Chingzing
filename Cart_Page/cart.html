<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - Chingzing</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../Home_Page/home.css">
  <link rel="stylesheet" href="cart.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <i class="fas fa-utensils"></i> Chingzing
      </div>
      <ul class="nav-menu">
        <li><a href="../Home_Page/home.html" class="nav-link">Home</a></li>
        <li><a href="../Cart_Page/cart.html" class="nav-link active"><i class="fas fa-shopping-cart"></i> Cart <span id="cart-count">0</span></a></li>
        <li><a href="#" id="logout-btn" class="nav-link logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
      </ul>
      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <section class="cart-section container">
    <div class="cart-header">
      <h2>Your Shopping Cart</h2>
      <p id="items-count-text">0 items</p>
    </div>

    <div class="cart-container">
      <div class="cart-items" id="cart-items-container">
        <!-- Cart items will be dynamically injected here -->
      </div>

      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span>Delivery Fee</span>
          <span id="summary-delivery">₹40</span>
        </div>
        <div class="summary-row">
          <span>Taxes</span>
          <span id="summary-taxes">₹0</span>
        </div>
        <hr class="summary-divider">
        <div class="summary-row total">
          <span>Total</span>
          <span id="summary-total">₹0</span>
        </div>
        <button id="checkout-btn" class="checkout-btn">Proceed to Checkout</button>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <p>&copy; 2026 Chingzing. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="cart.js"></script>
</body>
</html>
